<template>
    <lightning-card title="Engagement Summary" icon-name="standard:engagement">

        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Loading..."></lightning-spinner>
        </template>

        <template if:false={isLoading}>
            <div class="slds-p-around_medium">

                <!-- Opportunity Amount -->
                <div class="slds-m-bottom_small">
                    <p class="slds-text-title_caps slds-m-bottom_xx-small">
                        Related Opportunity Amount
                    </p>
                    <p class="slds-text-heading_medium">
                        <template if:true={opportunityAmount}>
                            {formattedAmount}
                        </template>
                        <template if:false={opportunityAmount}>
                            No opportunity linked
                        </template>
                    </p>
                </div>

                <hr/>

                <!-- Tasks y Events -->
                <div class="slds-grid slds-gutters slds-m-vertical_small">
                    <div class="slds-col slds-size_1-of-2">
                        <p class="slds-text-title_caps">Completed Tasks</p>
                        <p class="slds-text-heading_large">{completedTasks}</p>
                    </div>
                    <div class="slds-col slds-size_1-of-2">
                        <p class="slds-text-title_caps">Upcoming Events</p>
                        <p class="slds-text-heading_large">{upcomingEvents}</p>
                    </div>
                </div>

                <hr/>

                <!-- Botón -->
                <div class="slds-m-top_medium">
                    <lightning-button
                        label="Quick Follow-Up Call"
                        icon-name="utility:call"
                        variant="brand"
                        onclick={handleFollowUp}
                    ></lightning-button>
                </div>

                <!-- Mensaje de éxito/error -->
                <template if:true={message}>
                    <p class="slds-m-top_small" style={messageStyle}>{message}</p>
                </template>

            </div>
        </template>

    </lightning-card>
</template>
